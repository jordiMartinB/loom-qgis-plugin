name: Release

# Triggered when you push a version tag (either v0.1.0 or 0.1.0), or run manually.
on:
  push:
    tags:
      - 'v*'       # tags that start with "v", e.g. v0.1.0
      - '[0-9]*'   # tags that start with a digit, e.g. 0.1.0
  workflow_dispatch: {}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the Windows wheel
  # ---------------------------------------------------------------------------
  build-wheel-windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install libzip (vcpkg)
        run: |
          cd C:\vcpkg
          git fetch
          git checkout 2024-04-23
          .\bootstrap-vcpkg.bat
          .\vcpkg install libzip:x64-windows
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Set up Python 3.12 (x64)
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          architecture: 'x64'
          check-latest: true

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-windows-${{ hashFiles('src/**', 'setup.py', 'setup.cfg') }}
          restore-keys: sccache-windows-

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0

      - name: Build wheels
        env:
          CMAKE_BUILD_TYPE: Release
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          CIBW_ENVIRONMENT: "CMAKE_BUILD_TYPE=Release SCCACHE_DIR=${{ env.SCCACHE_DIR }}"
          CIBW_ENVIRONMENT_PASS: "VCPKG_ROOT SCCACHE_DIR"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
        run: cibuildwheel --output-dir wheelhouse

      # Keep wheels available for the next job
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-wheels-windows
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # 2. Build the Linux wheel
  # ---------------------------------------------------------------------------
  build-wheel-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          check-latest: true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ hashFiles('src/**', 'setup.py', 'setup.cfg') }}
          restore-keys: ccache-linux-

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0

      - name: Build wheels
        env:
          CMAKE_BUILD_TYPE: Release
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          CIBW_ENVIRONMENT_LINUX: >-
            CMAKE_BUILD_TYPE=Release
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            CCACHE_DIR=/host/root/.ccache
            CCACHE_MAXSIZE=500M
          CIBW_ARCHS_LINUX: "x86_64"
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-wheels-linux
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # 3. Package the plugin zip and publish the GitHub Release
  # ---------------------------------------------------------------------------
  publish-release:
    needs: [build-wheel-windows, build-wheel-linux]
    runs-on: ubuntu-22.04

    permissions:
      contents: write   # required to create/edit releases and upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Download Windows wheels
        uses: actions/download-artifact@v4
        with:
          name: release-wheels-windows
          path: wheelhouse

      - name: Download Linux wheels
        uses: actions/download-artifact@v4
        with:
          name: release-wheels-linux
          path: wheelhouse

      - name: Build plugin zips
        run: bash scripts/build_plugin_zip.sh "${{ github.ref_name }}" cp312 cp313 cp314

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/loom_qgis_plugin_linux_${{ github.ref_name }}.zip
            dist/loom_qgis_plugin_windows_${{ github.ref_name }}.zip
          generate_release_notes: true   # auto-fills changelog from merged PRs
