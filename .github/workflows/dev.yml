name: Dev Build

# Triggered on every push to the development branch, or manually.
on:
  push:
    branches:
      - development
  workflow_dispatch: {}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the Windows wheels
  # ---------------------------------------------------------------------------
  build-wheel-windows:
    runs-on: windows-2022
    env:
      SCCACHE_DIR: C:\Users\runneradmin\AppData\Local\Mozilla\sccache

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # needed for git describe

      - name: Set up vcpkg binary cache
        shell: pwsh
        run: |
          # Tell vcpkg to store compiled packages in a predictable location so
          # actions/cache can persist them between runs.
          $cacheDir = "C:\vcpkg-binary-cache"
          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          echo "VCPKG_DEFAULT_BINARY_CACHE=$cacheDir" >> $env:GITHUB_ENV
          echo "VCPKG_ROOT=C:/vcpkg"                  >> $env:GITHUB_ENV

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg-binary-cache
          # Key covers the vcpkg baseline commit + the package list so a
          # different vcpkg or a new package triggers a fresh build.
          key: vcpkg-windows-libzip-${{ hashFiles('**/vcpkg.json') }}-2024-04-23
          restore-keys: vcpkg-windows-libzip-

      - name: Install libzip (vcpkg)
        shell: pwsh
        run: |
          cd C:\vcpkg
          # Bring vcpkg up-to-date and bootstrap (no-ops if already current).
          git fetch --quiet
          .\bootstrap-vcpkg.bat -disableMetrics | Out-Null
          # vcpkg will skip packages already present in the binary cache.
          .\vcpkg install libzip:x64-windows

      - name: Set up Python 3.12 (x64)
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          architecture: 'x64'
          check-latest: true

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-windows-${{ hashFiles('src/**', 'setup.py', 'setup.cfg') }}
          restore-keys: sccache-windows-

      - name: Set up MSVC environment
        # Required so clang-cl can find MSVC headers, libs and link.exe.
        # LLVM/Clang (clang-cl, lld-link, ninja) are pre-installed on
        # the windows-2022 runner at C:\Program Files\LLVM\bin.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        env:
          CMAKE_BUILD_TYPE: Release
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          CIBW_ENVIRONMENT_WINDOWS: >-
            CMAKE_BUILD_TYPE=Release
            CMAKE_C_COMPILER=clang-cl
            CMAKE_CXX_COMPILER=clang-cl
            CMAKE_C_COMPILER_LAUNCHER=$SCCACHE_PATH
            CMAKE_CXX_COMPILER_LAUNCHER=$SCCACHE_PATH
            Python3_ROOT_DIR=
            Python_ROOT_DIR=
            Python2_ROOT_DIR=
          # Pass VCPKG, sccache, and also the MSVC env vars that ilammy sets
          # (LIB, INCLUDE, LIBPATH) so clang-cl can find the Windows SDK.
          CIBW_ENVIRONMENT_PASS_WINDOWS: "VCPKG_ROOT SCCACHE_DIR SCCACHE_PATH LIB INCLUDE LIBPATH"
          CIBW_ARCHS_WINDOWS: "AMD64"
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-wheels-windows
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # 2. Build the Linux wheels
  # ---------------------------------------------------------------------------
  build-wheel-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # needed for git describe

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          check-latest: true

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ hashFiles('src/**', 'setup.py', 'setup.cfg') }}
          restore-keys: ccache-linux-

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        env:
          CMAKE_BUILD_TYPE: Release
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          # before-all and environment for Linux are defined in pyproject.toml.
          # Only pass through the CCACHE_DIR so the cache action's path is used.
          CIBW_ENVIRONMENT_LINUX: >-
            CMAKE_BUILD_TYPE=Release
            CMAKE_GENERATOR=Ninja
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            CCACHE_DIR=/host/home/runner/.ccache
            CCACHE_MAXSIZE=500M
          CIBW_ARCHS_LINUX: "x86_64"
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-wheels-linux
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # 3. Package plugin zips and update the rolling "dev" pre-release
  # ---------------------------------------------------------------------------
  publish-dev:
    needs: [build-wheel-windows, build-wheel-linux]
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git describe

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Compute dev version
        id: version
        run: |
          # e.g. "v0.1.2-5-gabcdef" → "v0.1.2-dev" for simplicity,
          # or fall back to "dev" if no tag exists yet.
          BASE=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${BASE}-dev"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Windows wheels
        uses: actions/download-artifact@v4
        with:
          name: dev-wheels-windows
          path: wheelhouse

      - name: Download Linux wheels
        uses: actions/download-artifact@v4
        with:
          name: dev-wheels-linux
          path: wheelhouse

      - name: Build plugin zips
        run: bash scripts/build_plugin_zip.sh "${{ steps.version.outputs.VERSION }}" cp312 cp313 cp314

      - name: Update rolling "dev" pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Development build (${{ steps.version.outputs.VERSION }})"
          prerelease: true
          files: |
            dist/loom_qgis_plugin_linux_${{ steps.version.outputs.VERSION }}.zip
            dist/loom_qgis_plugin_windows_${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: false
          body: |
            Automated development build from the `development` branch.
            Based on **${{ steps.version.outputs.VERSION }}**.
            Built from commit ${{ github.sha }}.
