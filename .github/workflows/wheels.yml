name: Build wheels

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:          [ubuntu-latest, windows-2022]
        build_type:  [Release, Debug]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pin vcpkg commit (Windows)
        if: runner.os == 'Windows'
        id: vcpkg-pin
        run: |
          cd C:\vcpkg
          git fetch
          git checkout 2024-04-23
          .\bootstrap-vcpkg.bat
          $commit = git rev-parse HEAD
          echo "VCPKG_COMMIT=$commit" >> $env:GITHUB_ENV
          echo "commit=$commit" >> $env:GITHUB_OUTPUT
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Cache vcpkg packages (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-${{ steps.vcpkg-pin.outputs.commit }}-libzip-x64-windows

      - name: Install libzip (Windows)
        if: runner.os == 'Windows'
        run: |
          cd C:\vcpkg
          .\vcpkg install libzip:x64-windows
        shell: pwsh

      - name: Set up Python 3.12 (Linux / macOS)
        if: runner.os != 'Windows'
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          check-latest: true
          cache: 'pip'

      - name: Set up Python 3.12 (Windows x64)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          architecture: 'x64'
          check-latest: true
          cache: 'pip'

      - name: Export Python root (Windows)
        if: runner.os == 'Windows'
        run: |
          # pass the real Python install root into the cibuildwheel build env
          echo "Python3_ROOT_DIR=$env:pythonLocation" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Cache ccache (Linux)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-linux-${{ matrix.build_type }}-${{ hashFiles('src/loom/**') }}
          restore-keys: |
            ccache-linux-${{ matrix.build_type }}-

      - name: Install ccache (Windows)
        if: runner.os == 'Windows'
        run: choco install ccache --no-progress -y
        shell: pwsh

      - name: Cache ccache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\ccache
          key: ccache-windows-${{ matrix.build_type }}-${{ hashFiles('src/loom/**') }}
          restore-keys: |
            ccache-windows-${{ matrix.build_type }}-

      - name: Set up sccache (Windows)
        if: runner.os == 'Windows'
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Export sccache exe path (Windows)
        if: runner.os == 'Windows'
        run: |
          $exe = (Get-Command sccache).Source
          echo "SCCACHE_EXE=$exe" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Cache sccache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\Mozilla\sccache
          key: sccache-windows-${{ matrix.build_type }}-${{ hashFiles('src/loom/**') }}
          restore-keys: |
            sccache-windows-${{ matrix.build_type }}-

      - name: Build wheels
        env:
          CMAKE_BUILD_TYPE: ${{ matrix.build_type }}
          CIBW_BUILD: cp312-* cp313-* cp314-*
          CIBW_ENVIRONMENT_LINUX: >
            CMAKE_BUILD_TYPE=${{ matrix.build_type }}
            CMAKE_C_COMPILER_LAUNCHER=ccache
            CMAKE_CXX_COMPILER_LAUNCHER=ccache
            CCACHE_DIR=/project/.ccache
          CIBW_ENVIRONMENT_WINDOWS: >
            CMAKE_BUILD_TYPE=${{ matrix.build_type }}
            CMAKE_C_COMPILER_LAUNCHER=C:\hostedtoolcache\windows\sccache\0.14.0\x64\sccache.exe
            CMAKE_CXX_COMPILER_LAUNCHER=C:\hostedtoolcache\windows\sccache\0.14.0\x64\sccache.exe
            SCCACHE_DIR=C:\Users\runneradmin\AppData\Local\Mozilla\sccache
          CIBW_ENVIRONMENT_PASS: "VCPKG_ROOT"
          CIBW_ARCHS_WINDOWS: "AMD64"
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.build_type }}
          path: wheelhouse/*.whl
