name: Build wheels

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:          [ubuntu-latest, windows-2022]
        build_type:  [Release, Debug]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install libzip (Windows)
        if: runner.os == 'Windows'
        run: |
          # Pin vcpkg to a known-good commit that doesn't require PS 7.5.4
          cd C:\vcpkg
          git fetch
          git checkout 2024-04-23
          .\bootstrap-vcpkg.bat
          .\vcpkg install libzip:x64-windows
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Set up Python 3.11 (Linux / macOS)
        if: runner.os != 'Windows'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          check-latest: true

      - name: Set up Python 3.11 (Windows x64)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          architecture: 'x64'
          check-latest: true

      - name: Export Python root (Windows)
        if: runner.os == 'Windows'
        run: |
          # pass the real Python install root into the cibuildwheel build env
          echo "Python3_ROOT_DIR=$env:pythonLocation" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0

      - name: Build wheels
        env:
          CMAKE_BUILD_TYPE: ${{ matrix.build_type }}
          CIBW_ENVIRONMENT: "CMAKE_BUILD_TYPE=${{ matrix.build_type }}"
          CIBW_ENVIRONMENT_PASS: "VCPKG_ROOT Python3_ROOT_DIR"
          CIBW_ARCHS_WINDOWS: "AMD64"
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.build_type }}
          path: wheelhouse/*.whl
